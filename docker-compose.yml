services:

  # ============================================
  # QBITTORRENT — Cliente de torrents
  # ============================================
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota          # Ajustá a tu zona horaria
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ./downloads:/downloads
    ports:
      - 8080:8080       # Web UI
      - 6881:6881       # Torrent port
      - 6881:6881/udp
    restart: unless-stopped

  # ============================================
  # PROWLARR — Gestor de indexadores
  # ============================================
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696       # Web UI
    restart: unless-stopped

  # ============================================
  # RADARR — Gestor de películas
  # ============================================
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    volumes:
      - ./config/radarr:/config
      - ./media/movies:/movies
      - ./downloads:/downloads
    ports:
      - 7878:7878       # Web UI
    restart: unless-stopped

  # ============================================
  # SONARR — Gestor de series
  # ============================================
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    volumes:
      - ./config/sonarr:/config
      - ./media/tv:/tv
      - ./downloads:/downloads
    ports:
      - 8989:8989       # Web UI
    restart: unless-stopped

  # ============================================
  # TELEGRAM BOT — Bot con IA
  # ============================================
  telegram-bot:
    build: ./telegram-bot
    container_name: telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
    depends_on:
      - radarr
      - sonarr
    restart: unless-stopped
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=America/Bogota
    ports:
      - 8191:8191
    restart: unless-stopped
  warp:
    image: caomingjun/warp:latest
    container_name: warp
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - WARP_SLEEP=2
    ports:
      - 1080:1080    # SOCKS5 proxy
    volumes:
      - ./config/warp:/var/lib/cloudflare-warp